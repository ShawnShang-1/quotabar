name: Release macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build QuotaBar.app
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift toolchain
        run: swift --version

      - name: Prepare app zip
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          PREBUILT="release-assets/QuotaBar-${VERSION}-macOS.zip"
          OUTPUT="QuotaBar-${VERSION}-macOS.zip"

          if [ -f "$PREBUILT" ]; then
            cp "$PREBUILT" "$OUTPUT"
          else
            swift test
            Scripts/package-local-app.sh
            ditto -c -k --keepParent dist/QuotaBar.app "$OUTPUT"
          fi

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: QuotaBar-${{ github.ref_name }}-macOS.zip
          body: |
            QuotaBar macOS app build.

            This build is ad-hoc signed and not notarized. If macOS blocks it, right-click the app and choose Open, or run:

            ```bash
            xattr -dr com.apple.quarantine /Applications/QuotaBar.app
            open /Applications/QuotaBar.app
            ```

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuotaBar-macOS
          path: QuotaBar-*-macOS.zip
